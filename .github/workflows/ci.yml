name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - "reference/**"
  pull_request:
    paths-ignore:
      - "reference/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm lint
      # Catch Vite/PWA build breaks on PRs, not just at deploy time.
      - run: pnpm --dir packages/web bundle
      - run: pnpm test
      # Parity harness (packages/cli): the parity.test.ts guard runs inside
      # `pnpm test` above; this runs the golden scenarios as a standalone Node
      # program too, so a break in the runnable harness (loader, entry wiring)
      # surfaces in CI even if the vitest path stays green.
      - run: pnpm --filter @neo-angband/cli scenarios
