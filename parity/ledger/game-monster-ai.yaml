module: packages/core/src/game/monster-turn.ts
status: partial
baseline: 4.2.6
upstream:
  - path: src/mon-move.c
    items:
      - get_move_find_range: min_range / best_range. Ported: fear/FRIGHTENED
        flight distance (max_sight + flee_range), the bodyguard min_range = 1,
        the m_lev = level + (midx & 8) + 25 vs p_lev comparison and the
        (p_lev*p_mhp + 4*p_chp) health cross-multiply that scares strong
        monsters, the NEVER_MOVE / NEVER_BLOW +3 stand-off, and the turn_range
        "nearby monsters won't run" clamp.
      - get_move_advance: the flow-following core. Ported: pass-wall beeline,
        line-of-sight beeline (monster_can_see_player via square_isview), then
        sound (cave->noise flow heatmap) with the cardinal-first ddgrid_ddd
        8-direction scan and the current/backup noise comparison, then scent
        (cave->scent). Sets MFLAG_TRACKING.
      - get_move: advance vs. the MFLAG_TRACKING fallback / get_move_random
        step, the afraid flee branch, and get_move_choose_direction (the
        vertical / horizontal / diagonal preference with the turn-parity
        tie-break) producing a side_dirs row index.
      - monster_turn_should_stagger: the cumulative RAND_25 / RAND_50 erratic
        chances and the confusion staggers (CONF_ERRATIC_CHANCE per confusion
        grade), returning NO / CONFUSED / INNATE stagger.
      - monster_turn: the 5-step side_dirs (or random ddd when staggering)
        movement loop, the tracking commit early-out, monster_turn_can_move
        (player attack allowed, passable, PASS_WALL phasing, perm-wall block),
        NEVER_BLOW / NEVER_MOVE, attack the player via combat.monMeleeAttack,
        monster_turn_try_push (KILL_BODY trample / MOVE_BODY swap via
        compare_monsters), and the "out of options -> paralysed by fear"
        conversion of MON_TMD_FEAR to MON_TMD_HOLD.
      - process_monster_timed: sleep skip + monster_reduce_sleep, the
        FAST/SLOW/HOLD/DISEN/STUN/CONF/CHANGED/FEAR decrements, and the
        held/commanded skip plus the one-in-STUN_MISS_CHANCE stunned miss.
      - monster_check_active: MFLAG_ACTIVE from cdis<=hearing+passwall, hurt,
        in-view, can-hear, or can-smell.
      - monster_effect_level (mon-timed.c) and monster_passes_walls
        (mon-predicate.c).
notes: >-
  NOW WIRED (were deferred): spellcasting and breath via the state.monsterCast
  hook (make_ranged_attack, game/mon-ranged.ts), monster_group_rouse at the
  top of monster_turn, and group_monster_tracking in get_move's fallback
  branch (both game/mon-group.ts). Reproduction (monster_turn_multiply /
  multiply_monster with the num_repro cap), item pickup and crush
  (monster_turn_grab_objects, RF_TAKE_ITEM / KILL_ITEM), "duck behind a wall"
  flight (get_move_find_safety and the swerving get_move_flee, replacing the
  reverse-direction stub), door open/bash and wall kill/smash carving
  (OPEN_DOOR / BASH_DOOR / KILL_WALL / SMASH_WALL), and aggravation
  (OF_AGGRAVATE, read from playerState in monster_reduce_sleep) are all NOW
  PORTED (game/monster-turn.ts + game/mon-place.ts). Camouflage/mimic reveal
  (become_aware) is NOW PORTED (game/known.ts, installed via state.becomeAware):
  monster_turn_try_push reveals a camouflaged blocker before it is trampled and
  monster_turn itself reveals a camouflaged monster that did_something on its
  turn.
  DEFERRED (clear stubs, no behaviour yet): bodyguard tactics and the
  group-surround fill (get_move_bodyguard), pack ambush and get_move_find_hiding
  (in 4.2.6 its only caller is the out-of-scope ambush branch, so folding it
  into the afraid chain would itself deviate from upstream RNG order),
  damaging-terrain avoidance and monster_take_terrain_damage, glyph / decoy /
  web handling, and monster_is_mimicking lie-in-wait (mimics are not placed as
  objects yet).
  The monster-lore updates are DONE (mon-lore.yaml): melee counts each
  visible obvious/damaging blow's times_seen, notices deaths and runs
  lore_update, and monster_reduce_sleep counts wake/ignore on an obvious
  sleeper. monster_hates_grid always
  returns false (no damaging terrain modelled). cdis is refreshed by
  updateMonsterDistances (context.ts) in lieu of update_mon; the AI reads the
  Chunk noise/scent heatmaps produced by world/flow.ts.
verified-by:
  - monster-turn.test.ts: a hearing monster follows the noise flow and closes
    on the player each turn without stepping onto it; a visible monster
    beelines and melees an adjacent player (combat damage lands); an afraid
    monster flees directly away; a NEVER_MOVE monster holds ground; an aware
    monster's turn rouses a sleeping group-mate (monster_group_rouse wiring)
  - monster-turn.test.ts (statistical, seeded): a non-random monster never
    staggers; RAND_50 staggers ~50% and RAND_25 ~25% of the time over 2000 rolls
  - scheduler.test.ts exercises process_monster_timed / monster_check_active
    indirectly through process_monsters
