notes: >-
  Front-end-agnostic DATA port of the second character screen's resist / ability
  / sustain / modifier grid. buildUiEntryConfig(packRecords) compiles
  ui_entry.txt + ui_entry_base.txt + ui_entry_renderer.txt (plus the bindui rows
  of object_property.json / player_property.json) into concrete ui_entry records
  with bound properties; characterGrid(state, config, deps) returns, per panel,
  ordered rows of {label, labelColor, cells:[{symbol,color}]} - one cell per
  equipment slot then the player. Colours are COLOUR_* indices; symbols are the
  glyph strings the shell draws. Compilation is deliverable 1
  (packages/content/src/specs/ui-entry.ts + regenerated pack JSON).
deferred:
  - Per-object known twin (obj->known) is not ported (see obj/knowledge.ts
    L22-27), so compute_ui_entry_values_for_object uses the REAL object's
    flags/modifiers/el_info gated by the player's rune knowledge (p.objKnown) as
    the object_flag_is_known / object_element_is_known stand-in - the same
    known_state deferral char-sheet.yaml / obj-desc.yaml took. An unknown rune on
    a present object still yields UI_ENTRY_UNKNOWN_VALUE; a rune-hidden value is
    not otherwise concealed.
  - The upstream separate curse-object iteration (compute L833-863) is NOT ported:
    the port's curse model differs (curse data is merged into the object's own
    flags/modifiers/el_info by obj/object.ts mergeCurses), so computeObjectValues
    reads the object's own combined properties and does not walk obj->curses.
  - UiEntryDeps seams (defaults reproduce a headless character with no active
    timed effects; a session wires the computed player_state):
    - timedObjectFlags (default empty FlagSet): player_flags_timed(p) (player.c
      L310, the OF-flag dups of active timed effects). The ported timed registry
      carries no oflag_dup field, so timed OF-flag contributions default to none;
      OF_TRAP_IMMUNE IS still added from p.timed[TMD_TRAPSAFE] directly.
    - timedElementEffect (default () => 0): get_timed_element_effect(p, elem)
      (ui-entry.c L1357) - 1 if a timed effect grants a temp resist. The ported
      timed registry carries no temp_resist field, so timed element resists
      default to none.
    - playerHas (default reads p.pflags if present, else false): player_has(p,
      PF_*) (player.h L440, pf_has(p->state.pflags)). The port has no computed
      state.pflags, so the "player"-type abilities (only FAST_SHOT and BRAVERY_30
      in the data) contribute nothing by default.
  - PF_FAST_SHOT (compute L974) needs the equipped launcher and
    KF_SHOOTS_ARROWS; that launcher-slot reach is deferred, so its contribution
    is 0 (BRAVERY_30's p.lev >= 30 branch IS live).
  - The show_combined path and the EQUIPCMP_SCREEN (equippable-comparison)
    rendering are not wired: characterGrid drives CHAR_SCREEN1 only (the char
    screen always sets show_combined = false and alternate_color_first = false,
    so no combined cell is produced - the combined value only colours the row
    label). The EQUIPCMP_SCREEN category is compiled and bound but not iterated.
  - Per-category priority overrides are not reconstructable: the pack compiler
    erases the intra-record order of category vs priority lines, so a priority set
    after a specific category cannot be attributed to it. The shipped ui_entry.txt
    / ui_entry_base.txt never do this (priority always precedes any category, i.e.
    it sets the default priority), so every category inherits defaultPriority -
    faithful for the shipped data.
  - The DRAW half stays with the shell: the Term_putch / Term_putstr / safe_queue_
    chars row/col placement, region_erase, the value/label/combined position
    stepping (struct ui_entry_details positions), vertical labels, the equippy
    header (display_player_equippy L350) and the "abcdefgimnop@" / stat column
    headers.
