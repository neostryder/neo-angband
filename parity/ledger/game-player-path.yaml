module: packages/core/src/game/player-path.ts (running + pathfinding) +
  the internal command queue (game/context.ts cmdQueue, player-turn.ts
  processPlayer drain) and the run / pathfind / explore action wiring
  (session/game.ts)
status: verified
baseline: 4.2.6
upstream:
  - path: src/player-path.c
    items:
      - is_valid_pf (L80), prepare_pfdistances (L307),
        pfdistances_to_turncount (L479), pfdistances_to_path (L506) - the
        distance field over the level (movement turns * PF_SCL) from the
        player's memory, the border-unreachable marking, the closed-door
        (unlocked / locked) and rubble traversal penalties, the
        turncount rounding, and the backtracking path (forward keypad
        directions in reverse order).
      - find_path (L1069) - the start-to-dest path with the constraint
        loosening (remembered-only then any, no-traps then traps). Ported
        via prepare_pfdistances + pfdistances_to_path (the same distances
        upstream's patched-array A* approximates, so paths match up to
        tie-breaking) rather than the patched A* itself.
      - path_nearest_known (L834) - the path to the nearest remembered
        grid satisfying a predicate (travel-to-stairs), same loosening.
      - path_nearest_unknown (L932) - the explore target: the nearest
        remembered passable grid with an unknown neighbor, else the
        nearest remembered closed door / rubble with an unknown neighbor
        and a known-passable neighbor to stand on.
      - pathfind_direction_to (L1347) - the diagonal-preferring keypad
        direction from one point to another.
      - the pathfinding branch of run_step (L1903) - the stored path walk
        with the auto-open of a fully-surrounded closed door and the
        auto-dig of fully-known rubble (disturb, then re-issue the
        open / tunnel command and re-pathfind from path_dest), the
        block / visible-monster / remembered-object stops, and the
        convert-to-a-plain-run-if-the-path-ends-in-a-wall fallback.
      - do_cmd_pathfind / do_cmd_explore (cmd-cave.c L1500-L1571) as the
        pathfind / explore actions: compute the path, set steps /
        step_count / path_dest / running, and run_step(0).
      - see_wall (L1568) - a "known wall" in a direction: webs count,
        square_seemslikewall (TF_ROCK) gated by square_isknown, illegal
        grids are not walls.
      - run_init (L1606) - the new-direction setup: examine the two grids
        on each side of the destination (cycle[i+1] / cycle[i-1] from
        the player's grid = short, from the stepped-to grid = deep) to
        set run_break_left / _right and run_open_area, and pick the
        angled / blunt corridor entry direction (run_old_dir) for a
        hallway (both sides walled).
      - run_test (L1688) - the post-step surroundings scan: visible
        monsters / visible traps (unless trapsafe) / remembered objects /
        interesting features abort; the newly-adjacent open/obstacle
        analysis steering run_cur_dir and run_old_dir in a corridor; the
        soon-to-be-adjacent obvious-monster check; the open-area break
        detection; and the about-to-hit-a-known-wall stop.
      - run_step (L1878), running branch - start (real direction:
        run_init, running = 9999 if unset) or continue (dir 0: run_test,
        stop on true); the move via move_player (the port routes it
        through walkAction: move + FOV + autopickup + trap consequences);
        the post-move counter decrement; and the CMD_RUN re-queue while
        running remains.
  - path: src/cmd-core.c
    items:
      - cmdq (the command queue) reduced to GameState.cmdQueue: the run
        step's cmdq_push(CMD_RUN) pushes there and processPlayer
        (player-turn.ts) drains it before the injected nextCommand, so a
        single run keypress self-continues through runGameLoop exactly as
        upstream's re-queue does. disturb() flushes it.
notes: >-
  Running reads the player's memory (game/known.ts squareIsKnown /
  knownObject), the live cave for terrain / monsters / traps, and the
  monster visibility flags - identical inputs to upstream. The engine
  state (run_cur_dir etc. + upkeep->running + running_firststep) lives on
  GameState.run, created lazily by the run action; it is transient (not
  saved), like upstream. installRunning (session/game.ts) registers the
  run action over its player-turn stub; the web front end pushes a run
  command for a shift+move (roguelike keyset) and the loop drains the
  continuation to a stop.
deferred:
  - find_path uses prepare_pfdistances + pfdistances_to_path, NOT the
    patched-distance A* (an equal-result performance optimization);
    paths match upstream up to tie-breaking. The relaxation queue is a
    plain array shift() (upstream's q_queue); correctness is identical.
  - convert_turn_penalty (the door / rubble penalties assume moving costs
    z_info->move_energy, the common case; movement-speed class energy is
    unported) and compute_rubble_penalty's swap-to-best-digger
    recalculation (the wielded DIGGING skill decides, as in tunnelAux).
    compute_locked_penalty's dark / PF_UNLIGHT lighting nuance rides
    light. square_isdamaging is reduced to fiery terrain (lava).
  - Pathfinding reads live terrain gated by square_isknown rather than
    the remembered feat itself (identical for seen grids; only stale
    memory from magic mapping could differ), matching the running engine.
  - do_cmd_pathfind / do_cmd_explore are registered core actions but not
    yet wired to a web click / key (no grid-click handler exists front
    end); the running keypress is wired.
  - disturb() from events OTHER than run_test's own per-step checks (a
    monster waking or closing from behind, taking damage, a status
    message, resting). disturb() is exported so those sites call it as
    they land with the monster-AI / message / rest layers; run_test
    already stops for anything the runner moves toward.
  - The OF_TRAP_IMMUNE / shape-flag half of player_is_trapsafe (only the
    TMD_TRAPSAFE timer is read; #13 equipment flags); the running
    torch-radius recompute (PU_TORCH, light layer); the
    running-straight-into-a-trap-disarms nuance (move_player's disarm arg,
    trap layer); ignore_item_ok on remembered objects (#24 ignore) - any
    remembered floor object aborts, matching the "everything seen is
    known" front end.
verified-by:
  - game/player-path.test.ts (13 tests). Running (7): run_init detects a
    hallway (open-area cleared, both breaks set), treats unmemorized walls
    as open (see_wall's known-gate), and looks for an open area with no
    adjacent walls; a corridor run follows the hallway and stops on the
    last floor grid before the end wall (6 steps, counter zeroed, queue
    drained); an L-corridor run rounds the corner; a run halts one grid
    short of an obvious monster (the soon-to-be-adjacent check); disturb()
    zeroes the counter and flushes the queue. Pathfinding (6):
    pathfind_direction_to picks diagonals / cardinals / none; find_path
    returns a straight corridor path (reverse-order east steps), 0 for the
    start and -1 for a walled-off cell; travel walks the player to a
    destination (step_count zeroed, queue drained) and auto-opens a closed
    door mid-path then continues; explore's path_nearest_unknown targets
    the frontier column and walks the player there.
