  total: 112
  implemented: 11
  partial: 2
  stubbed: 99
  implemented-codes:
    - RANDOM (dummy, as upstream; selection lives in effect_do)
    - SELECT (dummy, as upstream)
    - HEAL_HP
    - NOURISH
    - CRUNCH
    - CURE
    - TIMED_SET
    - TIMED_INC_NO_RES
    - TIMED_DEC
    - SET_VALUE
    - CLEAR_VALUE
  partial-codes:
    - DAMAGE: player path complete (reduction, show_damage message,
