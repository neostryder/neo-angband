notes: >-
  The attack effect handlers, wired to the projection-casting spine
  (game/project-cast.ts) so the projection stack is now reachable from
  effect_do: a bolt/beam/ball/arc/breath dispatched as an effect fires
  project() over the live GameState via the two projection drivers. These
  handlers live in game/ (not effects/) because they need the GameState, and
  are registered from here so the effects/ layer stays below game/.

  The shared GameEffectEnv (game/effect-game-env.ts) carries the GameState, the
  CastContext (bound projections, max range, player-projection actor) and the
  acquired target / mon_current / charm; attachGameEnv puts it on an
  EffectContext. The player path is complete; the monster-origin refinements
  (confused / target-monster / decoy targeting, breath_dam) are the
  monster-spell layer's (#19).
deferred:
  - breath_dam(type, mon->hp) for monster breath damage (#19); the dice value is
    used until then.
  - resolveAimedTarget's monster targeting (confused direction, target-monster,
    decoy) and the target system (target_okay / target_get provide env.aimed) -
    #19 / #24.
  - PROJECT_LOS_AWARE's awareness-gated notice difference (a UI/notice nuance);
    both codes apply the same projection. BOLT_AWARE's PROJECT_AWARE flag is
    the same notice nuance (#25).
  - EF_LASH's monster-vs-monster target and decoy branches (#19); the target
    is the player.
verified-by:
  - game/effect-attack.test.ts (8 tests): through a real EffectRegistry
    (registerCoreHandlers + registerAttackHandlers), EF_BOLT damages the aimed
    monster and sets ident; EF_BEAM passes through several monsters in line;
    EF_BALL from a monster detonates on the player; EF_PROJECT_LOS hits every
    monster in line of sight; EF_BOLT_STATUS identifies only on a noticed
    (visible-monster) effect; EF_LASH whips the player with the first blow's
    lash element and fails for a player source; and every attack handler
    no-ops without an attack environment (the worldless rule).
  - game/effect-wonder.test.ts (2 tests): a mid die dispatches a poison
    ball that damages the target; a very rare die surges power and runs
    the heal-300 tail.
