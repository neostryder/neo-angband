module: packages/core/src/obj/ignore.ts (the ignore predicate engine +
  the player's ignore settings) + packages/core/src/game/ignore-cmd.ts
  (ignore_drop's scan) + wiring (game/context.ts isIgnored,
  session/game.ts, game/player-path.ts, game/pickup.ts, game/obj-cmd.ts,
  session/save.ts) + the configuration UI (packages/web/src/screens.ts
  quality/ego/sval menu builders, packages/web/src/main.ts's '=' / 'K'
  handlers and the ignore_drop shell pass)
status: partial
baseline: 4.2.6
upstream:
  - path: src/obj-ignore.c
    items:
      - quality_mapping (L44) as QUALITY_MAPPING and ignore_type_of (L382)
        - the tval (+ optional kind-name identifier) to ITYPE mapping,
        returning ITYPE_MAX for the unmappable.
      - cmp_object_trait (L434) and is_object_good (L448) - the
        to_d / to_h / to_d weighting (4 / 2 / 1) against the base kind's
        minimised trait, a positive base treated as zero.
      - ignore_level_of (L464) - the quality tier: jewelry is bad or
        average by its modifiers / combat signs; other items are bad /
        average / good by is_object_good, ego -> ALL, artifact -> MAX.
        The port treats every object as fully known, so the
        not-fully-known branch never applies.
      - the file-static settings (ignore_level[], ego_ignore_types[][],
        kind->ignore bits) as the IgnoreSettings class - quality
        thresholds per type, ego ignore keyed eidx:itype, per-kind
        aware / unaware flags keyed by kidx (kept off the immutable pack
        records), and p->unignoring. With snapshot / restore for the save.
      - object_is_ignored (L576) - the OBJ_NOTICE_IGNORE individual mark,
        the artifact / !k / !* exemption, kind ignore by flavor
        awareness, ego ignore, the assessed-non-artifact ALL shortcut,
        and the quality-tier <= threshold test.
      - ignore_item_ok (L622) - object_is_ignored gated by !unignoring.
  - path: src/cmd-cave.c, src/player-path.c, src/obj-pickup.c
    items:
      - ignore_item_ok is now wired at its call sites: the running /
        pathfinding object-abort (game/player-path.ts hasBlockingObject),
        autopickup and the pickup verbal check (game/pickup.ts), and the
        floor-command / display paths (game/obj-cmd.ts floorEnv). The
        session builds state.isIgnored = ignore_item_ok with live flavor
        awareness so those layers stay decoupled from flavor knowledge.
  - path: src/obj-ignore.c, src/ui-options.c
    items:
      - ego_has_ignore_type (L405) as core egoHasIgnoreType, and
        quality_values[].name as core QUALITY_VALUE_NAMES.
      - IgnoreSettings.kindToggleAware/kindToggleUnaware - the sval menu's
        per-bit toggle (ignore_sval_menu_action's `kind->ignore ^=
        IGNORE_IF_AWARE/UNAWARE`), distinct from the add-only
        kindIgnoreWhenAware/Unaware.
      - ignore_drop (L651) as core ignoreDropTargets (the scan half:
        eligible gear in backwards order, minus !d/!*-inscribed items,
        flagging which are worn) + the web shell's applyIgnoreDrop (the
        confirm/inscribe/queue-drop half).
      - The quality menu (quality_menu/quality_display/quality_action),
        the ego menu (ego_menu/ego_display/ego_action/ego_item_name/
        strip_ego_name/ego_comp_func), the sval menu
        (sval_menu/ignore_collect_kind/ignore_sval_menu_display/
        ignore_sval_menu_action/cmp_ignore), and do_cmd_options_item's
        top-level list (sval_dependent[]/ignore_tval), all as
        web/screens.ts builders driven from web/main.ts's '=' key
        (openIgnoreSetup) - reused verbatim titles/labels/footer wording
        where upstream has any. The 'K' unignoring toggle
        (textui_cmd_toggle_ignore) and its status-line indicator
        (prt_unignore) are wired too.
notes: >-
  The player's ignore settings live on GameState.ignore (an IgnoreSettings)
  and default to nothing ignored, matching the shipped default in a
  headless engine; they ride the save (SavedGame.ignore, optional so older
  saves load with everything shown). object_is_ignored / ignore_item_ok
  are pure (settings + a flavor-aware boolean), and everything reads them
  through the state.isIgnored closure the session installs. cmp_object_trait
  computes the base trait's minimise via a shared deterministic Rng (the
  minimise aspect draws no randomness).
deferred:
  - Autoinscription (rune_autoinscribe / get_autoinscription /
    apply_autoinscription / autoinscribe_pack) and the per-item context
    ignore menu (textui_cmd_ignore_menu) - out of scope for the
    configuration-menu gap; ledgered as follow-ups.
  - object_ignore_flavor_of (L370) - the auto-ignore-on-first-sight hook,
    a separate obj-knowledge.c surface from the menu/ignore_drop pair.
  - The PN_IGNORE notice pass and the ignore redraw / EVENT signals ride
    presentation (#25); the port applies settings immediately on read
    (ignore_drop's own PN_IGNORE trigger is reproduced directly: the shell
    runs the drop pass right after a menu edit or 'K', with no deferred
    notice flag to carry).
  - object_is_ignored's !obj->known / object_fully_known guards are moot
    while the port has no per-object known twin (everything is known), so
    ignore_level_of always takes the fully-known branch.
  - "everseen" gating on the ego menu and the sval menu's aware rows
    (ego->everseen / kind->everseen) - the port tracks no per-ego/per-kind
    "seen" flag, so every ego/kind with a valid ignore type is listed
    regardless of whether the player has encountered it yet (can spoil
    ego/flavour existence early). A lightweight seen-set is a follow-up.
verified-by:
  - obj/ignore.test.ts (23 tests) - ignore_type_of maps tvals (sword ->
    SHARP, hafted -> BLUNT, ring -> RING, potion -> ITYPE_MAX);
    ignore_level_of grades weapons bad / average / good, caps jewelry at
    bad / average, and rates ego -> ALL / artifact -> MAX; object_is_ignored
    ignores nothing by default, ignores by quality threshold per type,
    never ignores artifacts or !k-inscribed items, honors the individual
    ignore bit and the unignoring flag, ignores an ego of an ignored
    ego+type, ignores by aware / unaware kind, and round-trips the settings
    (including unignoring); egoHasIgnoreType true/false by ego + itype;
    kindToggleAware/kindToggleUnaware flip independent bits; an
    RNG-invariance test over every ignore-config operation.
  - game/ignore-cmd.test.ts (3 tests) - ignoreDropTargets collects
    pack + equipment gear currently ignored (excluding !d/!*-inscribed and
    non-ignored items), flags equipped targets, excludes everything while
    unignoring is active, and draws no randomness.
  - game/player-path.test.ts - a run stops beside a non-ignored floor
    object but runs past it once state.isIgnored returns true (the running
    / ignore wiring).
