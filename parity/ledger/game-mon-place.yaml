notes: >-
  This is the live-cave twin of the generation-time family in gen/util.ts
  (same upstream provenance); the barrel exports the live variants
  Live-suffixed (placeNewMonsterLive, pickAndPlaceMonsterLive,
  LiveMonPlaceDeps) to avoid colliding with the generation names. The
  session (wireGame) builds the shared MonAllocTable and threads
  trapPredicates and the mon-gen group constants in. Racial counts are now
  live: placement and populateFromLevel increment, deleteMonster and the
  level change's wipe_mon_list half (wipeMonsterCounts) decrement, and
  loadGame recounts from the restored monster list. player_kill_monster's
  dead-unique rule (max_num = 0) is wired in the session's onPlayerKill.
deferred:
  - mon_create_drop / mon_create_mimicked_object ride the
    monster-inventory subsystem (monster_carry / held objects); summoned
    monsters carry no loot yet, and ORIGIN_DROP_SUMMON stamps with it.
  - add_to_monster_rating and the cheat_hear OOD messages ride level
    feelings (#25); num_repro counting rides breeders; the PU_UPDATE_VIEW
    monster-light refresh rides the FOV consumers.
  - Killed-unique max_num zeroes are session-lifetime only; persisting
    them rides the save format (a lore/race-state section, #24).
  - compact_monsters / monster_index_move ride the level-cap pressure path
    (the port's monster list grows on demand); wipe_mon_list beyond the
    racial-count half is the session's store swap.
verified-by:
  - game/mon-place.test.ts (13 tests) - squareAllowsSummon accepts empty
    floor and refuses walls/occupants/player/decoy/warded/trapped grids;
    placeNewMonsterOne registers a counted, grouped monster (deleteMonster
    uncounts), honors sleep, refuses occupied/player/wall/glyph grids,
    enforces unique cur_num/max_num and FORCE_DEPTH; placeNewMonster
    places a same-race friend pack sharing the leader's group and
    wipeMonsterCounts rebalances; summonSpecific summons an eligible
    undead within 4 grids awake, returns 0 with no eligible race, zeroes
    energy and HOLDs only faster-than-player summons (seed sweep), and
    call moves an out-of-LOS resident to the summon point (woken, energy
    0, nothing created); summons join the summoner's group with the
    SUMMON role.
  - session/game.test.ts - the started game passes with the live counts
    (populateFromLevel counting, the unique max_num kill rule).
