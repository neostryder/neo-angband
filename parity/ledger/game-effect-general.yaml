        (project-player.c dispatches it through effect_simple). The
        rings/amulets/lights exclusion, the one_in_(count--) slot pick RNG
        order, the 60% artifact resist, and the to-hit/to-dam (weapon and
        bow) vs to-ac decrements with the >5 20% second point are
        verbatim; PU_BONUS is state.updateBonuses.
      - The stat family - RESTORE_STAT (L773), DRAIN_STAT (L803, sustain
        save with equip_learn_flag on both branches and the drain damage
        through the context's player takeHit), LOSE_RANDOM_STAT (L852,
