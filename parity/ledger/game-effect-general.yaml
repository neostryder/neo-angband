notes: >-
  Registered by registerGeneralHandlers over the core stubs; wireGame
  attaches GeneralEffectEnv (trapDeps) through the same deps threading as
  the teleport seams (obj-cmd / spell-cmd / mon-cast / trap effect
  bundles). Handlers no-op without a game env (worldless rule) and glyph /
  web creation no-ops without the trap system.
