        order and statMap bookkeeping). desc_stat reads the adjectives
        from the bound object properties (GeneralEffectEnv.properties).
      - RESTORE_EXP (L893) and GAIN_EXP (L913, amount halved), rippling
        level changes through GeneralEffectEnv.expDeps.
      - DRAIN_LIGHT (L928) - the light slot's fuel (not OF_NO_FUEL,
        timeout floored at 1) with the blind-gated message.
      - DRAIN_MANA (L956) - a decoy soaks the drain and is destroyed
        (square_destroy_decoy as squareRemoveAllTraps of the decoy kind +
        clearing GameState.decoy); no mana fails with its message; the
        drain is capped at csp (csp_frac cleared); a monster caster heals
        6 per point with the visible-monster message.
      - MON_TIMED_INC (L667) - mon_inc_timed on the casting monster.
notes: >-
  Registered by registerGeneralHandlers over the core stubs; wireGame
  attaches GeneralEffectEnv (trapDeps) through the same deps threading as
  the teleport seams (obj-cmd / spell-cmd / mon-cast / trap effect
  bundles). Handlers no-op without a game env (worldless rule) and glyph /
  web creation no-ops without the trap system.
deferred:
  - The equipment letter (gear_to_label) and ODESC_BASE description in the
    disenchant messages ride the display layer (#25); the kind's base name
    is used.
  - obj->known->to_h/to_d/to_a display sync - knowledge is rune-based
    here (obj/knowledge.ts).
  - Monster-AI decoy targeting (monster_is_decoyed and the decoy's death)
    rides lore/AI (#24); the decoy grid is tracked and the glyph trap is
    real.
  - DRAIN_MANA's monster-vs-monster branch (MON_TMD_DISEN on the target
    monster) rides monster-spell targeting (#19); update_smart_learn
    (PF_NO_MANA) rides lore (#24). MDESC monster names ride the display
    layer (#25); the race name stands in.
  - DRAIN_STAT's show_damage " (%d)" suffix is the options system (#30).
verified-by:
  - game/effect-general.test.ts (18 tests) - GLYPH places a warding glyph
    under the player; a decoy deploys once and a second is refused with
    the message; worldless no-op; WEB webs the full 3x3 at spell power 10
    and wider at 50, and fails for a player source; DISENCHANT lowers a
    worn weapon's to-hit/to-dam and refreshes bonuses, lowers armour to-ac
    with artifacts resisting, never touches rings/amulets/lights, and runs
    through the effect stack; RESTORE_STAT restores with its message;
    DRAIN_STAT drains unless sustained (learning the rune); GAIN_STAT
