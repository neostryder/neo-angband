module: packages/core/src/game/effect-general.ts
status: partial
baseline: 4.2.6
upstream:
  - path: src/effect-handler-general.c
    items:
      - effect_handler_GLYPH (L700) - the one-decoy-at-a-time check, the
        square_istrappable floor test with its message, push_object off the
        grid, and square_add_glyph as placeTrap of the "glyph of warding" /
        "decoy" trap kinds. The decoy grid is GameState.decoy (upstream
        cave->decoy).
      - effect_handler_WEB (L732) - the acting monster (cave->mon_current
        via GameEffectEnv.monCurrent) spins webs over every webbable grid
