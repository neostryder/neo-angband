notes: >-
  Traps live on state.traps (the GameState seam, like floor piles); gen
  marks trap grids and rolls door locks (place_closed_door 1-in-4 at 1d7,
  now recorded instead of discarded), and startGame instantiates both on
  the live cave and installs disarm + the step-onto-trap hook
  (walkAction -> onPlayerMoved -> hit_trap, exactly move_player's flow).
  Locked doors resolve through calc_unlocking_chance in the open command.
  The web renders revealed traps under objects/monsters.
