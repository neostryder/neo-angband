module: packages/core/src/obj/value.ts
status: complete
baseline: 4.2.6
upstream:
  - path: src/obj-power.c
    items:
      - object_value_base (L1060): the non-aware value guess - kind.cost when
        the flavor is aware, else a flat per-tval estimate (food/mushroom 5,
        potion/scroll 20, ring/amulet 45, wand 50, staff 70, rod 90). Ported
        with `aware` (object_flavor_is_aware) passed in.
      - object_value_real (L1099): FULLY PORTED. Constant-price path is
        kind.cost * qty for ordinary items, plus a per-charge premium
        (value * charges / 20, charges rounded up) for wands and staves. The
        variable-power path prices wearables and ammo from object_power (see
        obj/power.ts) via value = power * (power * a + b) with a = 1, b = 5 and
        the positive/negative overflow guards, scaled down by AMMO_RESCALER for
        ammo and non-ego burning torches, floored to 1 so cloaks are not
        worthless. Integer division matches C.
  - path: src/obj-tval.c
    items:
      - tval_has_variable_power (L256): ported to obj/object.ts; selects the
        object_power pricing path (weapons, launchers, ammo, armour, jewelry,
        lights).
notes: >-
  Valuation is live for both paths. Constant-price kinds (potions, scrolls,
  food, mushrooms, flasks, wands, staves, rods, ...) price from kind.cost (with
  the charge premium for wands/staves); wearables and ammo price from
  object_power (obj/power.ts). object_value_base takes flavor-awareness as a
  parameter rather than reading it, since the object-knowledge awareness state
  is not modelled yet.
upstream_extra:
  - object_value (L1253): the full dispatch PORTED - variable-power ->
    object_value_real; aware flavored -> object_value_real; else
    object_value_base * qty. Takes `aware` (object_flavor_is_aware, from
    FlavorKnowledge) as a parameter.
deferred:
  - The obj->known partial-knowledge twin: object_value upstream prices
    obj->known for variable-power items; with no known twin modelled this port
    values the real object, which is exact for a fully-known item (store stock,
    identified gear) and over-values only an item with still-unknown runes.
    Awaits the known-object model.
  - price_item is ported separately in packages/core/src/store/price.ts
    (ledgered in store-price.yaml).
verified-by:
  - obj/value.test.ts: a potion prices at kind.cost and kind.cost*qty; a wand
    adds the charge premium (cost + floor(cost*pval/20)); a costless kind is
    worthless; a 1d4 weapon prices at 66 = 6*(6+5) and scales with qty; a
    positive-power wearable never rounds to worthless; object_value_base returns
    the flat estimates when unaware and kind.cost when aware.
