module: packages/core/src/game/effect-terrain.ts
status: verified
baseline: 4.2.6
upstream:
  - path: src/effect-handler-general.c
    items:
      - effect_handler_RUBBLE (L2939) - randint1(3) rubble grids capped at
        the open neighbours, the ten-iteration sweep over ddgrid_ddd with
        one_in_(3) placement and one_in_(2) FEAT_PASS_RUBBLE vs FEAT_RUBBLE,
        in the upstream RNG order.
      - effect_handler_GRANITE (L2991) - FEAT_GRANITE on the originating
        trap's grid (the earthquake trap's wall seal); non-trap origins
        no-op.
      - effect_handler_CREATE_STAIRS (L1975) - the empty-floor test with its
        message, push_object, and square_add_stairs (cave-square.c L1337:
        the randint0(100) coin drawn first, town forcing down, quest levels
        - the teleport env's isQuest - and the bottom level forcing up).
      - effect_handler_LIGHT_LEVEL / DARKEN_LEVEL (L3003) - the full-form
        messages keyed on value.base and wiz_light / wiz_dark (cave-map.c
        L417/L488) reduced to their world half - SQUARE_GLOW set/cleared on
        the 3x3 neighbourhood of every grid that does not seem like a wall
        (TF_ROCK).
      - effect_handler_LIGHT_AREA / DARKEN_AREA (L3026/L3044) - light_room
        (cave-map.c L372): the room flood (walls lit but stopping the
        spread), cave_light's illumination wake-ups (smart 100 / normal 25 /
        stupid 10 on sleepers), cave_unlight sparing BRIGHT grids, the
        blind-gated messages, and the player-cast darkness blinding an
        unresisting caster 3+1d5 turns.
  - path: src/effect-handler-attack.c
    items:
      - effect_handler_DESTRUCTION (L1169) - the radius circle losing
