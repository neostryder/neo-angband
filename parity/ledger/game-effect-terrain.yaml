        reads the aimed seam (get_aim_dir / target_get, #24).
notes: >-
  Registered by registerTerrainHandlers over the core stubs; wireGame
  registers it with the other game-layer handler batches. light_room and
  wiz_light/wiz_dark live here (exported) until a dedicated cave-map module
  is warranted. Handlers no-op without a game env (worldless rule).
deferred:
  - The player square-memory half of cave-map.c (square_memorize / mark /
    forget, square_know_pile / sense_pile, square_light_spot redraws) rides
    the map-memory layer (#24/#25); the web renderer holds its own explored
    set. PF_UNLIGHT's dark-memorization likewise.
  - expose_to_sun / is_daytime on the surface ride the town day-night cycle;
    arena levels are not modelled (depth 0 takes the town branch).
  - birth_levels_persist (CREATE_STAIRS) and show_damage (EARTHQUAKE) are
    options (#30); total_winner recall interplay is with RECALL's ledger.
  - DESTRUCTION's artifact bookkeeping (history_lose_artifact /
    mark_artifact_created) rides artifact upkeep (#24) - nothing marks
    artifacts created yet, so a destroyed artifact can regenerate;
    EARTHQUAKE's square_changeable artifact check IS ported (artifact piles
    shield their grid).
  - DARKEN_AREA's monster-target branch (monster_target_monster, #19) and
    decoy branch (monster_is_decoyed, #24); MDESC names and the MON_MSG
    plural grammar ride the display layer (#25) - the race name stands in
    for the quake messages, shown only for visible monsters.
  - player_handle_post_move after the quake displacement rides the teleport
    env's onPlayerPostMove hook (installed by wireGame).
verified-by:
  - game/effect-terrain.test.ts (22 tests) - RUBBLE drops 1-3 rubble grids
    around the player and no-ops worldless; GRANITE walls the trap grid and
    ignores other origins; CREATE_STAIRS forces down in town and up at the
    bottom, refuses non-floor with its message and pushes objects off;
    LIGHT_AREA lights exactly the room with its message and wakes sleeping
    smart monsters; DARKEN_AREA darkens the room and blinds a player caster
    3+1d5 but not under a monster's spell; LIGHT_LEVEL / DARKEN_LEVEL sweep
    the whole level with the full-form messages; DESTRUCTION only shakes the
    town, deletes monsters in the circle (sparing distant ones, stairs and
    the player's grid), destroys objects, and blinds 10+1d10 on the light
    subtype; EARTHQUAKE only shakes the town, shuffles terrain without
    walling in the player, hurts or displaces a caught player and buries or
    damages monsters (seed sweeps), and leaves KILL_WALL monsters untouched.
