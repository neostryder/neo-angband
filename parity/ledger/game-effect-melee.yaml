module: packages/core/src/game/effect-melee.ts
status: verified
baseline: 4.2.6
upstream:
  - path: src/effect-handler-attack.c
    items:
      - effect_handler_TAP_UNLIFE (L1615) - the closest-undead target
        (closestTarget = the real target_set_closest(TARGET_KILL, pred) +
        target_get_monster from game/target.ts, so the drain retargets the
        player's target as upstream), the min(hp, amount) / 4 drain,
        mon_take_hit(" is destroyed!"), and the nested EF_RESTORE_MANA
        gain with its head-clearing messages.
      - effect_handler_CURSE (L1665) - direct damage to the chosen monster
        (target_get_monster, with the aimed seam as the worldless-test
        fallback), the "No monster selected!" refusal, mon_take_hit
        (" dies!"), and the fear message for shaken survivors.
      - effect_handler_JUMP_AND_BITE (L1710) - the closest living victim,
        the randint0(8)-started scan of its neighbours skipping player
        traps and webs (square_isopen: floor with no occupant), the
        not-enough-room refusal, monster_swap + player_handle_post_move
        (movePlayer + updateFov + onPlayerMoved), the min(hp + 1, amount)
