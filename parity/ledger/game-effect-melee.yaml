        only if any move was made), attacking a blocking monster and
        stopping, and the (blows * moves + 2) / 4 blow scaling into
        py_attack_real.
      - effect_handler_MELEE_BLOWS (L1907) - player-only, the adjacency
        and monster checks with their messages, py_attack_real per blow,
        and the PROJECT_KILL elemental side-effect projection after every
        damaging blow (via castProjection).
      - effect_handler_SWEEP (L1955) - player-only, one py_attack_real at
        each of the eight clockwise_grid neighbours per blow.
notes: >-
  Registered by registerMeleeHandlers over the core stubs. Melee routes
  through combat/melee.ts pyAttackReal with the same
  learnBrandSlayFromMelee / equipLearnOnMeleeAttack wrapping and
  onPlayerKill + deleteMonster kill path the walk command uses; effect
  damage routes through mon/take-hit.ts monTakeHit. Handlers no-op
  without a game env (worldless rule).
deferred:
  - Every formerly-deferred handler is now DONE: EF_WONDER / EF_BIZARRE
    (game-effect-attack / general), EF_COMMAND (game-mon-cmd), EF_PROBE
    (mon-lore), EF_SHAPECHANGE (game-shape) and EF_SINGLE_COMBAT
    (game-arena) - the effect_kind[] surface is fully ported.
  - target_set_closest's bookkeeping (target_set_monster, healthWho, the
    "No Available Target." / "%s is targeted." messages) is now the real
    game/target.ts implementation; the messages flow through state.msg
    (the world-event sink), not the effect context's.
  - MDESC names, message_pain grammar and MSG_TELEPORT sound ride the
    display layer (#25) - the race name stands in and pain messages are
    reduced to the MON_MSG_FLEE_IN_TERROR flee line; show_damage (#30).
  - MOVE_ATTACK's move_player is reduced to movePlayer + updateFov +
    onPlayerMoved (no autopickup / disturb on the pass-through grids);
    the early-death energy refund marked "Should return some energy"
    upstream is unimplemented there too.
verified-by:
  - game/effect-melee.test.ts (15 tests) - closestTarget targets the
    closest visible predicate match and ignores invisible monsters;
    TAP_UNLIFE drains the closest undead for the full amount and gains a
    quarter as mana, failing without an undead; CURSE damages the aimed
    monster, kills outright (rewarding onPlayerKill, deleting, saying the
    note) and refuses with no target; JUMP_AND_BITE lands the player
    adjacent, bites for the amount, heals and feeds by the drain, and
    no-ops without a living victim; MELEE_BLOWS lands blows with side
    effects on an adjacent monster and refuses far/empty targets with
    their messages; SWEEP hits every adjacent monster and nothing
    further; MOVE_ATTACK closes to adjacency on every seed and lands
    scaled blows (seed sweep), refusing a monsterless target.
