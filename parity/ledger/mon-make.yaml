module: packages/core/src/mon/make.ts
status: partial
baseline: 4.2.6
upstream:
  - path: src/mon-make.c
    items:
      - init_race_allocs (level-grouped alloc table, prob1 from rarity
        and the (1 + level / 10) depth factor; skips the <player>
        record and, vacuously, the player-ghost slot)
      - get_mon_num_prep (prob2 restriction hook, null clears)
      - get_mon_num (OOD boost 1 in ood-chance by min(level / 4 + 2,
        ood-amount); level-sorted cutoff; town monsters excluded from
        the dungeon and dungeon monsters from town; SEASONAL gating;
        unique cur_num/max_num rule; FORCE_DEPTH checked against the
        placement level; 60/10 percent deeper-race rerolls; stateful
        prob3 exactly as upstream)
      - get_mon_race_aux (weighted pick over prob3)
      - mon_hp (std-dev arithmetic, all aspects)
      - place_new_monster_one, construction half only (sleep timer
        val*2 + randint1(val*10); unique fixed avg_hp vs randomised
        normal hp clamped to 1; speed variety rand_spread by
        turn_energy/10 for non-uniques; random energy 0..49;
        FORCE_SLEEP -> MFLAG_NICE; UNAWARE -> MFLAG_CAMOUFLAGE;
        ATTR_RAND random attr; primary group info)
notes: >-
  RNG call order inside getMonNum and createMonster matches upstream
  (ood roll, aux pick, percent roll, rerolls; sleep, hp, speed, energy,
  attr) so seeded streams stay comparable. Divergences by design:
  SEASONAL is an option flag instead of reading the wall clock;
  turn_energy clamps speed to 0..199 where upstream indexes unchecked;
  builder throws when a race's level breaches max-depth (upstream would
  corrupt memory). Deferred (ledgered here): actual placement
  (place_monster, place_new_monster_one square checks, level rating,
  mon_pop/chunk monster list, update_mon), mon_create_drop and
  mon_create_drop_count, mimicked-object creation, group and friends
  placement (place_new_monster_group, place_friends,
  place_monster_base_okay, monster_group_assign), summoning
  (pick_and_place_*), deletion/compaction (delete_monster*,
  compact_monsters, monster_index_move, wipe_mon_list). Town
  generation counts (town-day/town-night) belong to level generation.
verified-by:
  - make.test.ts against the real pack (617 legal alloc entries,
    level-sorted, prob1 formula; seeded getMonNum at depths 1/10/40/98
    within the boosted-depth bound and never town monsters; depth-0
    picks are town-only; prep hook excludes dead uniques; cur_num cap
    skips uniques; rarity distribution sanity kobold vs wild cat;
    monHp arithmetic; createMonster unique/non-unique hp, speed
    variety bounds, sleep timer range, NICE and CAMOUFLAGE flags)
