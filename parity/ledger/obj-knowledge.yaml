module: packages/core/src/obj/knowledge.ts (+ learn_brand_slay_* in
  combat/brand-slay.ts and the game-layer call sites)
status: verified
baseline: 4.2.6
upstream:
  - path: src/obj-knowledge.c
    items:
      - player_learn_rune (L1264), split by variety into typed functions
        (the port keeps no flat rune list; each switch case is a function) -
        playerLearnCombat (the three c_rune combat runes, "enchantment to
        armor/hit/damage"), playerLearnMod, playerLearnResist (high elements
        only, as the rune list), playerLearnFlagRune, playerLearnBrand (all
        brands sharing the name learn together, L1307-1321), playerLearnSlay
        (all same_monsters_slain slays learn together, L1324-1338),
        playerLearnCurse. Each sends "You have learned the rune of %s."
        through the optional env.msg sink.
      - player_knows_brand/slay/curse (L436-473) as accessors over the
        sparse objKnown arrays.
      - object_learn_on_wield (L1820) FULL - the OBJ_NOTICE_WORN guard,
        object_flavor_tried, the create_obj_flag_mask(OFID_WIELD) obvious
        mask with the sustain-flag promotion for stat items (L1843-1848),
        obvious-flag learning with flag_message, the learn-all-modifiers
        loop with mod_message (the "You feel..." table, L1492 ported
        verbatim), and every object_curses_find_* call. The env-less call
        (birth outfit, worldless tests) learns modifiers only.
      - object_curses_find_to_a/to_h/to_d/flags/modifiers/element
        (L1561-1761): notice properties supplied by an object's curses,
        learning both the property rune and the curse rune.
      - missile_learn_on_ranged_attack (L1945), equip_learn_on_defend
        (L1974), equip_learn_on_ranged_attack (L2007, skipping the WEAPON
        and BOW slots), equip_learn_on_melee_attack (L2043, skipping BOW),
        equip_learn_flag (L2088), equip_learn_element (L2130),
        equip_learn_after_time (L2171, OFID_TIMED mask).
      - object_has_standard_to_h (L584) with the body-armor kind-to_h case.
      - init_rune (L75) as buildRuneList - the rune list in the exact
        upstream order (combat, modifiers, high elements, brands deduped
        by name, slays deduped by same_monsters_slain, named curses, the
        identifiable flags with NONE/LIGHT/DIG/THROW/CURSE_ONLY subtypes
        excluded); player_knows_rune (L253), object_has_rune (L603),
        player_learn_rune dispatched by variety (playerLearnRune),
        object_find_unknown_rune (L1770, candidates gathered in list order
        before randint0) and object_learn_unknown_rune (L1798, marking an
        exhausted object OBJ_NOTICE_ASSESSED). object_runes_known (L734)
        is reduced to "every rune the object carries is player-known"
        (the obj->known twin it compares upstream is filled from the same
        rune knowledge).
      - player_learn_innate (L1449) - racial el_info and flags at birth -
        and player_learn_all_runes (L1474) for wizard mode.
      - object_flavor_is_aware / was_tried / aware / tried as the
        FlavorKnowledge class (per-game, keyed by kidx; registry stays
        immutable); setTried is now wired into objectLearnOnWield.
  - path: src/obj-slays.c
    items:
      - learn_brand_slay_helper (L463) + learn_brand_slay_from_melee /
        _from_launch / _from_throw, in combat/brand-slay.ts - brands teach
        when unresisted, slays only on affected VISIBLE monsters, melee and
        throws include off-weapon (non weapon/launcher) equipment.
      - same_monsters_slain reused from obj/object.ts.
  - path: src/obj-properties.c
    items:
      - flag_message (L86) - the property's msg with the object base name
        substituted; gated on upkeep.playing as upstream.
  - path: src/player-calcs.c
    items:
      - calc_bonuses (L1877), the real-state gate this feeds. Equipped
        modifiers are multiplied by p->obj_k->modifiers (L1942-1981), so an
        unlearned modifier is inert even in play; flags, el_info resists and
        to_a/to_h/to_d apply to the real state regardless and their runes
        feed the DISPLAYED known_state (lands with #25).
notes: >-
  PlayerObjectKnowledge now models every rune variety (modifiers, the three
  combat runes, el_info, OF flags, brands, slays, curses); the brand/slay/
  curse arrays are sparse (learned indices only) and are densified in the
  save. The RuneEnv seam carries the registry tables (brands/slays/curses/
  properties), element rune names (from bound projections), live equipment
  access (slot_object) and the msg sink; session/game.ts wireGame installs
  the real env on state.runeEnv and the harness supplies an inert default.
  GAME-LAYER CALL SITES, matching upstream - wieldObject/invenWield (full
  wield learning), walkAction and attackBlocker melee (equip_learn_on_
  melee_attack + learn_brand_slay_from_melee, player-attack.c L822),
  monster melee on the player (equip_learn_on_defend, mon-attack.c L530),
  processWorld every 100 game turns (equip_learn_after_time, game-world.c
  L755), trap saves by OF flag (equip_learn_flag, trap.c L538), and birth
  (playerLearnInnate + full wield learning over the starting kit,
  player-birth.c L495/L1274). ELEM names for rune messages come from the
  projection registry ("acid", "lightning", ...), exactly upstream's
  projections[i].name.
deferred:
  - The per-object obj->known twin and everything display-only that hangs
    off it - "had a chance to notice" markers (equip_learn_flag/element's
    else branches, the timed-mask union), object_fully_known's
    effect-knowledge half, update_player_object_knowledge's gear/store
    sweep, object_sense / object_see / object_touch / object_grab, and
    rune_note inscriptions. All land with the known-object/display
    system (#25).
  - object_learn_on_use's exp reward + PN_IGNORE (cmd-obj.c wiring exists
    for flavor awareness; the exp formula joins it with the ignore system).
  - shape_learn_on_assume is DONE (game-shape.yaml); the shape branches
    of equip_learn_* (skipping merged gear while shapechanged) still ride
    the gear-merge model.
  - temporary brands/slays (player-timed table, ledgered with
    improveAttackModifier). learn_brand_slay_helper's monster-lore learns
    are DONE (mon-lore.yaml).
  - equip_learn_flag/element call sites living in unported upstream files
    (project-player.c resist learning rides #17; effect-handler learn calls
    ride #18; cmd-cave.c OF_AFRAID, player-util.c OF_REGEN/IMPAIR,
    mon-util.c, obj-chest.c ride their subsystems).
  - object_flavor_aware's side effects (ignore/autoinscribe, store sweeps,
    floor-tile refresh) - FlavorKnowledge.setAware still sets only the bit.
  - ODESC_BASE via object_desc: baseName() strips ~ and & from the kind
    name until the real object_desc lands (#25).
verified-by:
  - knowledge-learn.test.ts rune-list block (3 tests) - the list builds
    in upstream order with one brand rune per name and no
    throwing/digging/light flag runes; objectHasRune / playerKnowsRune /
    objectRunesKnown track an enchanted weapon's combat runes; and
    objectLearnUnknownRune learns the remaining unknown rune with its
    message, then marks the exhausted object assessed.
  - game/effect-identify.test.ts (3 tests) - EF_IDENTIFY learns one
    unknown rune of the chosen item, a cancelled pick leaves the effect
    unused, and a fully-known item fails the item tester.
  - knowledge-learn.test.ts (19 tests) - wield learns obvious flags,
    promotes sustains on stat items, learns all modifiers and sets the WORN
    guard (a second wield is a no-op); timed-only flags do NOT learn on
    wield; defend teaches to-armor from worn armor; melee teaches
    to-hit/to-dam from an enchanted weapon and nothing from a plain one;
    missiles teach the combat runes; equip_learn_flag notices only flags
    the equipment has; equip_learn_element notices resists with the glow
    message; equip_learn_after_time notices timed flags; one brand learns
    every same-name brand; one slay learns every same-monsters slay; melee
    teaches unresisted brands and skips resisted ones; slays teach only on
    affected visible monsters; launch learning reads missile+launcher but
    not worn gear; a High-Elf is born knowing its LIGHT resist and
    SEE_INVIS runes while a Human knows nothing; every learned variety
    round-trips through the save and a legacy (objKnownModifiers-only)
    save still loads.
  - gear.test.ts / bonuses.test.ts: the calc_bonuses modifier gate
    (unchanged behaviour, now through blankObjKnowledge).
  - knowledge.test.ts: FlavorKnowledge awareness/tried semantics.
