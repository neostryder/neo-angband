module: packages/core/src/obj/knowledge.ts
status: partial
baseline: 4.2.6
upstream:
  - path: src/obj-knowledge.c
    items:
      - object_learn_on_wield (L1820): PORTED only the "Learn all modifiers"
        loop (L1863-1871) - every nonzero modifier on the worn item learns its
        rune, setting player.objKnown.modifiers[i] = 1 (player_learn_rune's
        RUNE_VAR_MOD case, L1291-1296).
  - path: src/player-calcs.c
    items:
      - calc_bonuses (L1877): the real-state gate this feeds. Equipped
        modifiers are multiplied by p->obj_k->modifiers (L1942-1981), so an
        unlearned modifier is inert even in play; flags, el_info resists, and
        to_a/to_h/to_d apply to the real state whenever !known_only (L1985,
        L1997-2006) and are NOT gated by knowledge.
notes: >-
  Only the modifier-learning slice of obj-knowledge.c is ported, because it is
  the sole knowledge that changes REAL bonuses: calc_bonuses gates equipped
  modifiers through obj_k, so a worn +N modifier is inert until its rune is
  known, and object_learn_on_wield learns every modifier the instant an item is
  worn - which is why a freshly worn +3 STR ring raises STR by 3 at once and
  simultaneously "discovers the rune of strength". Wired at wieldObject
  (game/gear.ts), the single wield chokepoint both birth's wield_all and any
  future runtime wield pass through, matching upstream (wield_all L494-495,
  inven_wield obj-gear.c L983). obj_k is empty at birth (PORT_PLAN decision 25);
  a default class kit carries no modifiers, so it stays empty until magic gear
  is worn.
deferred:
  - The OBJ_NOTICE_WORN guard and object_flavor_tried: there is no obj->known
    twin yet, so re-wielding simply re-learns (idempotent) instead of
    short-circuiting.
  - Obvious-flag learning: create_obj_flag_mask(OFID_WIELD) intersection plus
    the sustain-flag promotion for stat items (L1839-1861). Needs obj_k->flags,
    which PlayerObjectKnowledge does not model yet. Flags apply to the REAL
    state regardless of knowledge, so deferring this changes only the display.
  - All object_curses_find_* learning (to_a/to_h/to_d/flags/modifiers/element
    from curses, L1873-1883): curse knowledge is not modelled.
  - The learn-by-use paths that populate el_info / combat / brand / slay
    knowledge: object_learn_on_use, equip_learn_on_defend,
    equip_learn_on_melee_attack, equip_learn_on_ranged_attack,
    equip_learn_element, equip_learn_flag, missile_learn_on_ranged_attack.
    These teach the DISPLAY state only (resists/brands already apply to the
    real state), and land with the message log and known_state.
  - player_learn_rune's non-modifier varieties (combat/resist/brand/slay/
    curse/flag) and the "You have learned the rune of %s." messages.
  - update_player_object_knowledge / the whole known_state (calc_bonuses called
    with known_only = true) used for the character sheet.
verified-by:
  - gear.test.ts: wielding a +3 STR ring flips objKnown.modifiers[STR] from 0
    to 1 so the bonus goes live; wielding a plain torch learns only its LIGHT
    modifier and leaves every stat rune unknown.
  - bonuses.test.ts: the calc_bonuses rune gate (a +3 STR item adds 0 while the
    rune is unknown and +3 once objKnown.modifiers[STR] = 1).
