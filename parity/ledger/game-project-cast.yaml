notes: >-
  The projection-casting spine: the game-layer glue that makes the whole
  projection stack usable. castProjection assembles project()'s ProjectHooks
  (world/project.ts) from the two drivers - projectMonster
  (game/project-monster.ts) and projectPlayer (game/project-player.ts) - over
  the live GameState, and runs one projection. It is the single seam the attack
  effect handlers (#18), monster spells (#19) and player spellcasting (#22) all
  dispatch a bolt/beam/ball/arc/breath through. The flag-shape helpers
  (castBolt / castBeam / castBall) preset project()'s flags and radius exactly
  as the matching effect_handler_* and delegate to it.

  The player-projection actor (PlayerProjActor: resist levels, damage
  reduction, minus_ac) is supplied by the caller, exactly as PlayerActor's
  combat / defense views are, because calc_bonuses (which derives el_info,
  dam_red, perc_dam_red, minus_ac) is deferred. basicPlayerActor builds the
  no-resist, no-reduction view over the live Player for callers and tests until
  it lands; chp and is_dead are live getters/setters so take_hit's mutations
  write back to the player and the game state.
deferred:
