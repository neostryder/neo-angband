notes: >-
  The projection-casting spine: the game-layer glue that makes the whole
  projection stack usable. castProjection assembles project()'s ProjectHooks
  (world/project.ts) from the two drivers - projectMonster
  (game/project-monster.ts) and projectPlayer (game/project-player.ts) - over
  the live GameState, and runs one projection. It is the single seam the attack
  effect handlers (#18), monster spells (#19) and player spellcasting (#22) all
  dispatch a bolt/beam/ball/arc/breath through. The flag-shape helpers
  (castBolt / castBeam / castBall / castArc / castBreath / castShortBeam /
  castLine / castAlter / castSpot / castSphere / castStrike / castStar /
  castStarBall / castTouch / castSwarm / castProjectLos) preset project()'s
  flags and radius exactly as the matching effect_handler_* and delegate to it.

  The player-projection actor (PlayerProjActor: resist levels, damage
  reduction, minus_ac) is supplied by the caller, exactly as PlayerActor's
  combat / defense views are, because calc_bonuses (which derives el_info,
  dam_red, perc_dam_red, minus_ac) is deferred. basicPlayerActor builds the
  no-resist, no-reduction view over the live Player for callers and tests until
  it lands; chp and is_dead are live getters/setters so take_hit's mutations
  write back to the player and the game state.
deferred:
  - effect_handler_LASH (L899): the whip/spit finite beam - its damage is summed
    from the caster's monster blows (mon->race->blow[]), so it lands with the
    monster-spell layer (#19) that already has that data; the projection shape
    itself is a short beam (castShortBeam).
  - The effect-registry wiring (registering these as the EF_* handlers) and the
    player-timed / EffectPlayer adapters for the general handlers - next
    increment.
  - resolveAimedTarget's monster branch (confused direction, target-monster,
    decoy) and the target system (target_okay / target_get) - #19 / #24.
  - onObject (#20 floor objects) and onFeature (#21 traps/terrain) projection
    hooks; breath_dam for monster breath damage (#19).
  - A real PlayerProjActor from calc_bonuses (resists, damage reduction,
    minus_ac) replaces basicPlayerActor's zeroes.
verified-by:
  - game/project-cast.test.ts (23 tests): basicPlayerActor writes take_hit
    mutations back to the live player/state and shares the timed array;
    resolveAimedTarget aims a player projection at the adjacent grid, at an
    acquired DIR_TARGET grid, and a monster projection at the player with
    PROJECT_PLAY; castBolt damages the monster it stops at, tracks the single
    monster hit, damages the player through the live actor, kills the player and
    fires the death hook, and suppresses vs shows bolt visuals by blindness;
    castBeam passes through and damages every monster in line; castBall explodes
    on a player-cast target and detonates on the player for a monster source;
    castLine damages a monster in its path while castAlter (no KILL) leaves it
    unharmed; castArc damages a monster on its centreline; castSpot hits a
    neighbour and scales self damage down; castStar shoots a beam in each
    direction; castStrike drops a jump ball with no path; castSwarm applies its
    given shot count; castProjectLos hits every monster in LOS, skips the
    excluded caster, and does not reach one blocked by a wall.
