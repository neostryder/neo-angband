# Gamedata compiler and the core content pack (pack zero).
#
# YAML stream: the first document covers the parser/compiler
# infrastructure; the following documents cover each compiled pack file;
# the trailing documents record the deferred gamedata files.
#
# Divergences shared by every pack file (stated once here, not repeated):
# - rand (dice) fields are validated against the parse_random() grammar
#   but stored as RAW strings (e.g. "1+2d3M4"); they are never evaluated.
# - Directives that upstream accumulates via string_append (desc, msg,
#   lore, D map rows, phrase, ...) or into lists (flags, blows, drops,
#   owners, ...) are stored as arrays of values in FILE order. Joining a
#   string array with "" reproduces the upstream concatenated string.
#   Note that several upstream parsers PREPEND to linked lists (store
#   owners and buy entries, summon bases, monster friends), so upstream
#   in-memory order is the reverse of file order; loaders must not assume
#   the C memory order.
# - char fields are stored as one-character JSON strings (a glyph may be
#   a space or a colon).
# - Sub-record structure (effect chains with their dice/expr, class
#   book -> spell -> effect, monster_spell power-cutoff levels, trap
#   effect-xtra chains, player_timed on-begin/on-end effects) is nested in
#   the JSON exactly as the upstream "attach to the most recent instance"
#   parse state does it. Directives seen before their first parent (e.g.
#   monster_spell lore before any power-cutoff: the implicit first level)
#   stay on the record itself.
module: packages/content/src/parser.ts
status: ported
baseline: 4.2.6
upstream:
  - path: src/parser.c
    items:
      - parser_parse
      - parser_reg
      - parse_specs
      - parse_type
      - parse_random
  - path: src/parser.h
notes: >-
  Line-level record format semantics: comment/blank handling, directive
  lookup, ':' tokenization with strtok collapse of empty fields, str
  fields consuming the rest of the line, char fields consuming exactly one
  character then ':' or end of line, strtol/strtoul base-0 number parsing,
  optional '?' fields, and parse_random validation. parser.c error codes
  are surfaced as thrown errors with file:line context instead of the
  upstream parser_state. Field values are kept verbatim; nothing is
  normalized. Record assembly (packages/content/src/records.ts) and the
  CLI (packages/content/src/compile.ts) are the pack-format replacements
  for the per-file init hooks and have no single upstream counterpart.
verified-by:
  - packages/content/src/parser.test.ts and records.test.ts (unit)
  - packages/content/src/pack.test.ts (record counts re-derived from the
    upstream .txt files at test time, plus content spot checks)
---
