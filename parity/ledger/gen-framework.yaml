module: packages/core/src/gen/util.ts, packages/core/src/gen/generate.ts
status: partial
baseline: 4.2.6
upstream:
  - path: src/gen-util.c
    items:
      - grid_to_i / i_to_grid / shuffle (Knuth)
      - cave_find_init / cave_find_get_grid / cave_find_reset / cave_find /
        cave_find_in_range (uniform-without-replacement rectangular search)
      - find_empty / find_nearby_grid
      - correct_dir / rand_dir
      - find_start / new_player_spot (player start selection; the
        birth_connect_stairs stair placement is exposed as an injected
        createStair argument rather than reading player upkeep)
      - place_stairs / place_random_stairs / place_secret_door /
        place_closed_door / place_random_door / place_rubble
      - place_object / place_gold (via ./obj make_object / make_gold)
      - alloc_stairs (near-wall placement with minsep + avoid list)
      - alloc_object / alloc_objects (SET_/TYP_ dispatch)
      - vault_objects / vault_traps / vault_monsters
      - the dun_data bookkeeping struct (cent/ent/ent2room, door/wall/tunn,
        block dims, room_map, pit_num, join lists) as the Dun class
  - path: src/gen-room.c
    items:
      - generate_room / generate_mark / fill_rectangle / draw_rectangle /
        fill_xrange / fill_yrange / fill_circle / generate_plus /
        generate_open / generate_hole / set_marked_granite /
        set_bordering_walls
  - path: src/gen-monster.c
    items:
      - spread_monsters (structural loop; monster theming simplified)
  - path: src/cave-square.c
    items:
      - square_isempty / square_isopen / square_canputitem /
        square_isarrivable / square_num_walls_adjacent /
        square_num_walls_diagonal / square_suits_stairs_well /
        square_suits_stairs_ok / count_neighbors, adapted to the gen context
  - path: src/generate.c
    items:
      - cave_generate: profile selection, build-into-chunk, the
        clear-generation-flags pass, the monster-maximum regeneration
        trigger, and the try-until-valid retry loop (generateLevel)
counts:
  live-branches: [cave_find search order, new_player_spot fallback ladder,
                  alloc_stairs, alloc_object corridor/room dispatch,
                  place_object/place_gold via obj make, generateLevel retry]
notes: >-
  The upstream Chunk stores object and trap piles per square; this port's
  Chunk stores only a monster index. During generation the Gen context tracks
  placed objects (objOccupied + objects list), placed monsters (mirrored into
  the Chunk mon array + monsters list) and trap grids, so square_isempty and
  square_canputitem decide placement exactly as upstream. RNG call order is
  faithful for the structural/placement helpers; determinism for a fixed seed
  is verified end to end (identical terrain, player spot and monster/object
  counts across two runs).
deferred:
  - Pit/nest monster theming (mon_restrict): pits place any depth-appropriate
    monster (group_ok off, as upstream). Placement RNG order therefore
    diverges from upstream where theming would have restricted the table;
    structural invariants are asserted instead. NOTE monster group/escort
    spawning (place_new_monster / place_friends / place_new_monster_group /
    the escort-base prep hook) is now PORTED in gen/util.ts: group indices
    come from a per-generation counter recorded on each monster's group_info,
    and session/game.ts rebuilds the live groups from them (the savefile
    loading path of monster_group_assign). Unique cur_num tracking stays
    level-local (plus the shared-registry cur_num check for friend uniques).
  - place_trap only records the grid (the trap domain / trap objects are not
    ported); square_set_door_lock is a no-op but its RNG roll is preserved.
  - Arena and quest levels, persistent-level connectors (join / one_off), the
    known-level ("player cave") duplicate, level feeling (place_feeling /
    calc_*_feeling), and dump_level HTML output.
  - The birth_connect_stairs / birth_levels_persist player-option paths of
    new_player_spot (exposed as an injected createStair parameter).
verified-by:
  - packages/core/src/gen/gen.test.ts: determinism, connectivity flood fill,
    stair/player invariants, monster/object count ranges, bounds
