module: packages/core/src/game/effect-summon.ts
status: verified
baseline: 4.2.6
upstream:
  - path: src/effect-handler-general.c
    items:
      - effect_handler_SUMMON (L2241) - the monster-origin loop (kin_base
        capture for KIN, summoning until the squared levels reach
        depth * rlev or attempts hit the rolled max, the fallback-type
        retry loop, "But nothing comes." on total failure) and the
        player-origin loop (depth + level_boost, delayed, one_in_(4)
