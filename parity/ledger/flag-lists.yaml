notes: >-
  Generated by packages/core/scripts/codegen-lists.mjs (run manually; the
  output is committed). One module per X-macro list header: 31 modules,
  1174 entries total, each keeping every macro argument as a named field
  (field names follow the header comment blocks and the consuming
  structs/enums in reference/src, noted per module). Each module also
  exports a NAME -> value map whose numbers match the UPSTREAM ENUM VALUES,
  not merely the entry position: obj-properties.h prepends OF_NONE (so
  OF.SUST_STR is 1 and flags line up with 1-indexed bitflag sets),
  effects.h prepends EF_NONE, generate.h prepends ROOMF_NONE, the OBJ_MOD_
  enum starts with the five stats from list-stats.h (OBJ_MOD.STEALTH is 5),
  and the PROJ_ enum lists the 25 elements before list-projections.h
  (PROJ.LIGHT_WEAK is 25). Value conversion: true/false -> boolean, NULL ->
  null, integer literals -> number, C string literals -> decoded strings,
  other identifiers and bitmask expressions (RST_/PR_/PU_/RFT_ etc.) kept
  as raw strings. Savefile-order warnings in the headers apply to entry
  order here too. The script globs all list-*.h, so a header added on a
  future rebase is picked up automatically and fails loudly until a field
  descriptor is added for it.
