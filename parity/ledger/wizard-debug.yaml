  - path: src/wiz-debug.c
    items:
      - wiz_cheat_death (L28) as wizCheatDeath - reset age, refill HP/SP, clear
        the eight affliction timers, feed (TMD_FOOD), and return to town
        (state.targetDepth = 0 + generateLevel). noscore |= NOSCORE_WIZARD and
        the word_recall / deep_descent cancels are not carried (no player noscore
        field; recall/deep-descent counters ride #23's level-change model).
notes: >-
  The WIZARD / DEBUG command surface. These are cheat/debug commands; upstream
  gates them behind ALLOW_DEBUG and NOSCORE_WIZARD, and this project's design
  (decision 16: faithful, no-save-scumming play) must never reach them in
  ordinary play. The port keeps that gate as an explicit WizardDeps.wizard
  boolean seam: every action is a no-op refusal when wizard is false, so the
  surface is a dev affordance behind a flag exactly like upstream. Most commands
  are thin wrappers that drive already-ported engine systems with debug
  parameters; the module wires to them (obj/make.ts object creation, the effect
  interpreter's effect_simple for detection/teleport/summon/restore, game/trap.ts
  place_trap, game/mon-place.ts place_new_monster, obj/object.ts curses,
  player/exp.ts exp/level, mon/lore.ts recall, game/effect-terrain.ts wiz_light)
  rather than re-implementing them. The Term / prompt UI halves stay with the
  shell: a selection or count is taken as a parameter, and the map QUERY /
  dump commands return the grids or feature grid the shell would highlight or
  write, not the drawing.
deferred:
  - src/wiz-spoil.c (749 lines): the obj / monster / artifact spoiler-file
    generators. Pure offline dev tooling that writes files; low value for a play
    port. Deferred entirely.
  - The three Monte-Carlo statistics collectors: do_cmd_wiz_collect_disconnect_
    stats (L585), do_cmd_wiz_collect_obj_mon_stats (L622), do_cmd_wiz_collect_
    pit_stats (L671), and their src/wiz-stats.c backends (disconnect_stats /
    stats_collect / pit_stats). They run thousands of level generations to gather
    histograms - heavy, low value for a play port. Deferred (omitted).
  - do_cmd_wiz_stat_item (L2386): a TEST_ROLL = 100000 make_object rarity
    sampler. Same rationale as the stats collectors (a heavy Monte-Carlo
    sampler); deferred.
  - The pure interactive shells, whose non-UI sub-actions ARE ported as standalone
    functions:
    - do_cmd_wiz_play_item (L1596): the [a]ccept/[s]tatistics/[r]eroll/[t]weak/
      [c]urse/[q]uantity/[k]nown menu that queues the sub-commands. The menu and
      its screen_save/get_com keypress loop are UI; the sub-actions it dispatches
      to are ported as standalone functions (wizRerollItem, wizTweakItem,
      wizCurseItem) except change_item_quantity (deferred below).
    - wiz_display_item (L190): the Term_clear / prt / prt_binary flag dump. Pure
      Term rendering.
    - do_cmd_wiz_edit_player_start (L1202) / _stat (queued form): the command-
      queue orchestration that chains the stat/gold/exp edits with the static
      edit_player_state machine. The individual edits are ported (wizEditPlayerStat
      / wizEditPlayerGold / wizEditPlayerExp); the queue-chaining shell is UI.
    - do_cmd_wiz_perform_effect (L1524): the free-form effect prompt (name, dice,
      subtype, radius, other, y, x). Pure prompt UI over effect_simple, which is
      already reachable; not ported as a distinct action.
  - do_cmd_wiz_change_item_quantity (L484): NOT ported this slice. The action is a
    stack-size setter with MAX_PVAL / quiver-slot / charge-timeout scaling; it is
    only reached from the play_item menu (also deferred) and its limit math leans
    on quiver/charge helpers. Deferred with the play_item shell; low standalone
    value.
  - do_cmd_wiz_quit_no_save (L2149): quit("user choice") - a process-exit action,
    not game state. Not ported (the shell owns process lifetime).
  - mark_artifact_created (obj-mark) in the artifact create path: the port has no
    artifact-created registry yet (obj/make.ts makeArtifact is a stub that always
    fails, as if every artifact were already generated). wizCreateObjectFromArtifact
    instantiates the artifact but does not record it as created; when artifact
    upkeep lands, this call site should mark it.
  - do_cmd_wiz_jump_level's NOSCORE_JUMPING flag, choose_profile (cave-profile
    selection) and the energy_use nudge: no player noscore field, no cave-profile
    picker, and the port's level-change model does not need the energy nudge.
  - The map-highlight redraw halves of query_feature / query_square_flag /
    peek_noise_scent (wiz_hack_map + print_rel + prt_map + inkey) and the HTML
    file write of dump_level_map: presentation (#25) / file I/O. Only the DATA
    (the grids / the feature grid) is returned.
  - Web hook: SKIPPED. The wizard actions need the full engine deps bundle
    (makeDeps / the effect stack / trapDeps / monPlace), which session/game.ts
    builds internally and startGame does not return, and the web Player carries
    no noscore/options wizard toggle (packages/web/src/main.ts L487-488). Exposing
    a wizard hook would mean plumbing those deps out of the session assembly -
    not the minimal, low-risk change the task scopes. Skipped and noted.
seam:
  - WizardDeps.wizard (boolean): the wizard/debug gate (upstream ALLOW_DEBUG +
    NOSCORE_WIZARD). Every exported action checks wizardEnabled(deps) first and is
    a no-op refusal (returns false / [] / null, no state change) when it is false.
    The rest of WizardDeps are the already-ported engine bundles, each optional so
    a caller can expose only the subset of commands it needs (an absent bundle
    behaves as gated): makeDeps (obj/make.ts), expDeps (player/exp.ts), effect (the
    effect_simple bundle - registry + cast + envDeps + optional teleport/general/
    item/summon), trapDeps, monPlace, flavor, races, artifacts, curses, msg.
verified-by:
  - game/wizard.test.ts (26 tests): the wizard gate blocks a non-wizard
    wizCreateObj (nothing dropped) and the map-query data commands (empty) while
    wizard mode permits them; wizCreateObj drops the requested kind on the floor
    and refuses an out-of-range index; wizAdvance maxes stats/level/gold and
    restores HP/SP; wizCureAll clears the affliction timers and heals; wizBanish
    deletes monsters within range and spares distant ones; wizAcquire drops the
    requested count; wizCurseItem adds then removes a curse; the exp/gold/stat
    edits clamp to their bounds; wizLearnObjectKinds makes low-level kinds aware;
    wizRecallMonster / wizWipeRecall learn then forget a race's lore; wizSummonNamed
    places the named race; wizCreateTrap places a trap in the dungeon and refuses
    in town; wizTeleportRandom moves the player, wizMagicMap and wizDetectAllMonsters
    run through effect_simple; wizWizardLight lights and knows the level; wizRerate
    reports a life rating in the legal band; wizRerollItem rerolls in place; and the
    map-query DATA commands (wizQueryFeature / wizQuerySquareFlag / wizPeekFlow /
    wizDumpLevelMap) return the expected grids / feature grid.
